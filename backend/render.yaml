services:
  # Production Web Service
  - type: web
    name: smart-attendance-backend
    env: node
    repo: https://github.com/dhrma-tech/student-attendance-sys.git
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "npm start"
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-app-url.vercel.app
      - key: APP_SECRET
        sync: false

# Auto-deploy configuration
autoDeploy: yes
branch: main
